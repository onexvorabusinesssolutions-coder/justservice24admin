name: Deploy React Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy React via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e

            APP_NAME="justservice24admin"
            APP_DIR="/var/www/apps/$APP_NAME"
            REPO_URL="https://github.com/onexvorabusinesssolutions-coder/justservice24admin.git"

            BUILD_DIR="$APP_DIR/dist"
            NGINX_DIR="/var/www/html/$APP_NAME"

            # clone if not exists
            if [ ! -d "$APP_DIR" ]; then
              git clone $REPO_URL $APP_DIR
            fi

            cd $APP_DIR

            git pull origin main

             # 🔥 CREATE .env FROM GITHUB SECRETS
            cat > .env <<EOF
            PUBLIC_URL=${{ secrets.PUBLIC_URL }}
            VITE_APP_BASE_NAME=${{ secrets.VITE_APP_BASE_NAME }}
            VITE_API_URL=${{ secrets.VITE_API_URL }}
            VITE_IMG_URL=${{ secrets.VITE_IMG_URL }}
            EOF

            # Node setup
            source /etc/profile.d/nvm.sh || true

            npm ci
            npm run build

            mkdir -p $NGINX_DIR

            # deploy build to nginx
            rm -rf $NGINX_DIR/*
            cp -r dist/* $NGINX_DIR/

            echo "Frontend deployed successfully"
